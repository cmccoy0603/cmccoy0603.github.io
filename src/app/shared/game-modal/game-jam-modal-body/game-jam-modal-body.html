<div class="d-grid gap-4">
    <div class="text-center">
        <h3 class="game-modal-title m-0">{{ game().title }}</h3>
    </div>

    <div class="w-100">
      <app-iframe-start-wrapper
        [src]="game().iframeUrl || ''"
        [title]="game().title"
        buttonLabel="Start game"
        ></app-iframe-start-wrapper>
    </div>

    <p class="lead text-dark mb-0 text-center">{{ game().description }}</p>
</div>
