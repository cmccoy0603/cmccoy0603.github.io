<div class="d-grid gap-4">
    <div class="row g-4 align-items-start">
        <div class="col-12 col-lg-7">
        <p class="lead text-dark mb-3">{{ game().modalContent?.summary }}</p>
        <p class="text-dark mb-0">{{ game().description }}</p>
        </div>

        <div class="col-12 col-lg-5">
        <div class="rounded-4 overflow-hidden shadow-sm border border-1 border-secondary-subtle bg-white">
            <img
            class="img-fluid w-100"
            [src]="game().image"
            [alt]="game().title"
            />
        </div>
        </div>
    </div>

    <div class="d-flex flex-row justify-content-center">
        <app-iframe-start-wrapper
        [src]="game().iframeUrl || ''"
        [title]="game().title"
        buttonLabel="Start 3DChromo Twist"
        description="Click to load the Godot build only when you are ready to play."
        ></app-iframe-start-wrapper>
    </div>
</div>
